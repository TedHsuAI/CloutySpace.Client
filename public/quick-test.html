<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google OAuth 快速測試</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <div style="padding: 20px; text-align: center;">
        <h1>Google OAuth 快速測試</h1>
        <p>請測試這個簡單版本是否可以正常工作</p>
        
        <div id="g_id_onload"
             data-client_id="35839759120-90afmlogombmf5dotfnsp2rgm4n6dhfr.apps.googleusercontent.com"
             data-callback="handleCredentialResponse"
             data-auto_prompt="false">
        </div>
        <div class="g_id_signin" 
             data-type="standard"
             data-size="large"
             data-theme="outline"
             data-text="signin_with"
             data-shape="rectangular"
             data-logo_alignment="left">
        </div>
        
        <div id="result" style="margin-top: 20px;"></div>
        
        <script>
            function handleCredentialResponse(response) {
                console.log("登入成功！JWT Token:", response.credential);
                document.getElementById('result').innerHTML = 
                    '<p style="color: green;">✅ 登入成功！檢查瀏覽器控制台查看 token</p>';
            }
            
            // 確認設定
            console.log("頁面 URL:", window.location.href);
            console.log("Client ID:", "35839759120-90afmlogombmf5dotfnsp2rgm4n6dhfr.apps.googleusercontent.com");
        </script>
    </div>
</body>
</html>
